name: Node.js Frontend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. 테스트 단계 (테스트가 실패하면 배포되지 않음)
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend  # [중요] frontend 폴더 기준 실행

    steps:
    - name: 체크아웃 코드
      uses: actions/checkout@v4

    - name: Node.js 20 설정
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 의존성 설치
      run: npm install

    - name: 테스트 실행
      # package.json의 test 스크립트가 "exit 0"이면 무조건 통과됩니다.
      run: npm test

  # 2. 빌드 및 이미지 푸시
  build-and-push:
    needs: test  # 테스트가 성공해야만 실행
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: 체크아웃 코드
      uses: actions/checkout@v4

    - name: Docker Hub 로그인
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker 이미지 빌드 및 푸시
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/community-frontend:v1.1

  # 3. 배포 (Deploy)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: EC2 접속 및 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # 1. 최신 이미지 가져오기
          docker pull ${{ secrets.DOCKER_USERNAME }}/community-frontend:v1.1
          
          # 2. 배포 폴더로 이동 (없으면 생성)
          mkdir -p /home/${{ secrets.SERVER_USER }}/frontend-deploy
          cd /home/${{ secrets.SERVER_USER }}/frontend-deploy
          
          # 3. docker-compose.yml 생성 (가장 안전한 방법)
          echo "version: '3.8'
          services:
            frontend:
              image: ${{ secrets.DOCKER_USERNAME }}/community-frontend:v1.1
              container_name: community-fe
              restart: always
              ports:
                - \"3000:3000\"
              
              # 백엔드 API 주소 등 환경변수가 필요하면 아래에 추가
              # env_file:
              #   - .env
              
              networks:
                - community_net
          
          networks:
            community_net:
              driver: bridge" > docker-compose.yml
          
          # 4. 컨테이너 재시작
          docker-compose down
          docker-compose up -d
          
          # 5. 미사용 이미지 정리
          docker image prune -f