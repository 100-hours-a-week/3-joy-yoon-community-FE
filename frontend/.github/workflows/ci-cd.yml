name: Node.js Frontend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    
    # [중요] frontend 폴더 기준
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: 체크아웃 코드
      uses: actions/checkout@v4

    - name: Docker Hub 로그인
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Docker 이미지 빌드 및 푸시
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        # 태그를 v1.2로 고정 (서버랑 맞추기 위해)
        tags: ${{ secrets.DOCKER_USERNAME }}/community-frontend:v1.2

  deploy:
    needs: build-docker-image
    runs-on: ubuntu-latest
    steps:
    - name: EC2 접속 및 배포
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # 1. 최신 이미지 받기
          docker pull ${{ secrets.DOCKER_USERNAME }}/community-frontend:v1.2
          
          # 2. 배포 폴더로 이동
          mkdir -p /home/${{ secrets.SERVER_USER }}/frontend-deploy
          cd /home/${{ secrets.SERVER_USER }}/frontend-deploy
          
          # 3. docker-compose.yml 생성
          # [수정 포인트]
          # - image: 변수 대신 직접 입력 (확실한 버전 보장)
          # - volumes: 삭제 (새 코드 적용을 위해 필수)
          # - build: 삭제 (이미지 쓸 거니까)
          # - ports: .env 변수 사용 가능하도록 역슬래시(\) 처리
          
          echo "version: '3.8'
          services:
            frontend:
              image: ${{ secrets.DOCKER_USERNAME }}/community-frontend:v1.2
              container_name: community-fe
              restart: always
              
              env_file:
                - .env
              
              ports:
                - \"\${PORTS}:\${PORTS}\"
                
              networks:
                - community_net
          
          networks:
            community_net:
              driver: bridge" > docker-compose.yml
          
          # 4. 재시작
          docker-compose down
          docker-compose up -d
          
          # 5. 정리
          docker image prune -f